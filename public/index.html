<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Austin Schlutter</title>
  <link rel="stylesheet" href="./src/style/style.css" />
</head>
<body>

  <div id="desktop">

    <!-- Desktop Icons (left column) -->
    <div id="desktop-icons">
      <div class="desktop-icon" data-window="about">
        <img class="icon-img" src="icons/about.png" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
        <span class="icon-emoji" style="display:none"><img src="../images/msagent-3.png" width="32px"></span>
        <span>About Me</span>
      </div>
      <div class="desktop-icon" data-window="projects">
        <img class="icon-img" src="icons/projects.png" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
        <span class="icon-emoji" style="display:none"><img src="../images/directory_closed_cool-0.png" width="32px"></span>
        <span>My Projects</span>
      </div>
      <div class="desktop-icon" data-window="skills">
        <img class="icon-img" src="icons/skills.png" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
        <span class="icon-emoji" style="display:none"><img src="../images/chip_ramdrive-2.png" width="32px"></span>
        <span>Skills.txt</span>
      </div>
      <div class="desktop-icon" data-window="resume">
        <img class="icon-img" src="icons/resume.png" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
        <span class="icon-emoji" style="display:none"><img src="../images/notepad_file-2.png" width="32px"></span>
        <span>Resume.pdf</span>
      </div>
      <div class="desktop-icon" data-window="contact">
        <img class="icon-img" src="icons/contact.png" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
        <span class="icon-emoji" style="display:none"><img src="../images/envelope_closed-0.png" width=32px></span>
        <span>Contact</span>
      </div>
      <div class="desktop-icon" id="recycle-bin">
        <span class="icon-emoji"><img src="../images/recycle_bin_full_cool-3.png" width="32px"></span>
        <span>Recycle Bin</span>
      </div>
    </div>

    <!-- Windows Container -->
    <div id="windows-container"></div>

    <!-- Taskbar -->
    <div id="taskbar">
      <button id="start-btn" onclick="toggleStartMenu()">
        <span class="start-logo"><img src="../images/windows_slanted-1.png" width="20px"></span>
        <span>Start</span>
      </button>

      <div class="taskbar-divider"></div>

      <!-- Open window buttons appear here -->
      <div id="taskbar-windows"></div>

      <!-- System Tray -->
      <div id="system-tray">
        <span class="tray-icon"><img src="../images/bottomicon.png" width="12px"></span>
        <span class="tray-icon"><img src="../images/loudspeaker_rays-0.png" width="12px"></span>
        <div class="tray-divider"></div>
        <span id="taskbar-clock"></span>
      </div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu" class="hidden">
      <div class="start-sidebar">
        <span>Austin Schlutter</span>
      </div>
      <div class="start-items">
        <div class="start-item" data-window="about">
          <span><img src="../images/msagent-3.png" width="15px"></span> About Me
        </div>
        <div class="start-item" data-window="projects">
          <span><img src="../images/directory_closed_cool-0.png" width="15px"></span> My Projects
        </div>
        <div class="start-item" data-window="skills">
          <span><img src="../images/chip_ramdrive-2.png" width="15px"></span> Skills.txt
        </div>
        <div class="start-item" data-window="resume">
          <span><img src="../images/notepad_file-2.png" width="15px"></span> Resume.pdf
        </div>
        <div class="start-item" data-window="contact">
          <span><img src="../images/envelope_closed-0.png" width=15px></span> Contact
        </div>
        <div class="start-separator"></div>
        <div class="start-item" id="shutdown-btn">
          <span>🔌</span> Shut Down...
        </div>
      </div>
    </div>

  </div>

  <script src="./src/app.js"></script>
</body>
</html>
